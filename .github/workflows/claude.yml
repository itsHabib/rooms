name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history: the action's tag-mode diff (git hash-object) needs
          # PR-branch blobs that a depth-1 checkout of main lacks, so a shallow
          # fetch kills @claude review on any PR that adds files.
          fetch-depth: 0

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Pin an explicit model id. The action installs the latest Claude Code
          # each run and otherwise uses the CLI's default model; that default
          # drifted to an id the OAuth-subscription token can't reach, so the SDK
          # errored on turn 1 and the reviewer posted only a stub. Pin the id
          # (not the `sonnet` alias, which can re-resolve to the broken default).
          claude_args: "--model claude-sonnet-4-6"
          additional_permissions: |
            actions: read
